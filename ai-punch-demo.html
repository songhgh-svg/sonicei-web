<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Punch™ Interactive Demo — SONIC E&I Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1628;--navy-mid:#112040;--gold:#c9a227;--gold-light:#e8c347;
  --white:#f0f4ff;--gray:#8899bb;--green:#00c896;--blue:#0057ff;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--navy)}
body{
  color:var(--white);font-family:'Be Vietnam Pro',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  height:100vh;padding:0;gap:0;
}

/* ── STEP NAV — same width as phone, set by JS ── */
.step-nav{
  flex-shrink:0;
  display:flex;
  background:#070f1e;
  border:1px solid rgba(201,162,39,0.25);
  border-radius:10px 10px 0 0;
  overflow:hidden;
  margin-bottom:0;
}
.step-btn{
  flex:1;background:none;border:none;cursor:pointer;
  padding:7px 4px;font-family:'Share Tech Mono',monospace;font-size:8px;
  letter-spacing:1px;color:var(--gray);text-transform:uppercase;
  border-right:1px solid rgba(201,162,39,0.15);transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2;
}
.step-btn:last-child{border-right:none}
.step-btn .snum{font-family:'Bebas Neue',sans-serif;font-size:15px;color:rgba(136,153,187,0.35);line-height:1;transition:color .2s}
.step-btn.active .snum{color:var(--gold)}
.step-btn.active{background:rgba(201,162,39,0.08);color:var(--gold)}
.step-btn.done .snum{color:rgba(0,200,150,0.55)}
.step-btn.done{color:rgba(0,200,150,0.5)}
.step-btn:hover:not(.active){color:var(--gold-light);background:rgba(201,162,39,0.04)}

/* ── PHONE — real iPhone mockup, flex:1 to fill remaining height ── */
.phone{
  flex:1;
  display:flex;flex-direction:column;
  overflow:hidden;
  /* width set by JS */
  background:#0d1f38;
  border-radius:36px;
  border:2.5px solid rgba(201,162,39,0.35);
  box-shadow:
    0 0 0 1px rgba(0,87,255,0.15),
    0 0 50px rgba(0,87,255,0.2),
    0 30px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.12);
  position:relative;
  margin:8px 0;
}
.phone-notch{
  width:80px;height:22px;background:#070f1e;
  border-radius:0 0 16px 16px;margin:0 auto;
  border:1.5px solid rgba(201,162,39,0.2);border-top:none;
  flex-shrink:0;
}
.phone-home{
  width:36px;height:4px;background:rgba(255,255,255,0.18);
  border-radius:2px;margin:8px auto;flex-shrink:0;
}
.phone-topbar{
  background:#070f1e;padding:5px 12px 4px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;
}
.phone-appname{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--gold)}
.phone-appname span{color:var(--white)}
.phone-stepbadge{font-family:'Share Tech Mono',monospace;font-size:7.5px;color:rgba(136,153,187,0.55);letter-spacing:1px}
.phone-progbars{display:flex;gap:2px;padding:3px 12px;background:#070f1e;flex-shrink:0}
.pbar{flex:1;height:2px;border-radius:1px;background:rgba(201,162,39,0.1);transition:background .4s}
.pbar.done{background:rgba(0,200,150,0.5)}
.pbar.active{background:var(--gold)}
.s6-tabs{display:flex;border-bottom:1px solid rgba(201,162,39,0.15);flex-shrink:0;position:relative}
.s6-tab{flex:1;background:none;border:none;cursor:pointer;padding:5px 8px 5px;
  font-family:'Share Tech Mono',monospace;font-size:7.5px;letter-spacing:1.5px;
  color:var(--gray);text-transform:uppercase;transition:all .2s;
  border-right:1px solid rgba(201,162,39,0.12);
  position:relative;
  animation:tabPulse 2s ease-in-out infinite;}
.s6-tab:last-child{border-right:none}
.s6-tab.active{background:rgba(201,162,39,0.1);color:var(--gold);animation:tabPulseActive 2s ease-in-out infinite;}
/* arrow under inactive tab pointing up */
.s6-tab:not(.active)::after{
  content:'▲';
  position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  font-size:7px;color:var(--gold);
  animation:arrowBounce 1s ease-in-out infinite;
  pointer-events:none;
}
@keyframes tabPulse{
  0%,100%{background:none;box-shadow:none;}
  50%{background:rgba(201,162,39,0.07);box-shadow:0 0 8px rgba(201,162,39,0.2);}
}
@keyframes tabPulseActive{
  0%,100%{background:rgba(201,162,39,0.1);box-shadow:none;}
  50%{background:rgba(201,162,39,0.2);box-shadow:0 0 10px rgba(201,162,39,0.3);}
}
@keyframes arrowBounce{
  0%,100%{transform:translateX(-50%) translateY(0);opacity:0.6;}
  50%{transform:translateX(-50%) translateY(3px);opacity:1;}
}
.phone-screen{
  flex:1;position:relative;overflow:hidden;background:#0a1628;
}
.screen-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:opacity .4s ease;opacity:0;
}
.screen-img.visible{opacity:1}
.scan-line{
  position:absolute;left:0;right:0;height:2px;z-index:5;pointer-events:none;
  background:linear-gradient(to right,transparent,var(--gold),var(--blue),var(--gold),transparent);
  box-shadow:0 0 10px var(--gold);display:none;
  animation:scanMove 1.4s ease-in-out infinite;
}
.scan-line.active{display:block}
@keyframes scanMove{0%{top:3%}100%{top:94%}}
.phone-tags{display:flex;gap:4px;flex-wrap:wrap;padding:4px 12px 0;flex-shrink:0}
.dtag{padding:2px 7px;font-family:'Share Tech Mono',monospace;font-size:7px;
  letter-spacing:1px;text-transform:uppercase;border:1px solid;border-radius:2px}
.dtag.major{color:#ff9944;border-color:rgba(255,153,68,0.5);background:rgba(255,153,68,0.06)}
.dtag.pass{color:var(--green);border-color:rgba(0,200,150,0.4);background:rgba(0,200,150,0.06)}
.dtag.fixed{color:#60aaff;border-color:rgba(96,170,255,0.4);background:rgba(96,170,255,0.06)}
.phone-infostrip{
  background:linear-gradient(to top,rgba(7,15,30,0.98),rgba(7,15,30,0.88));
  padding:6px 12px 5px;flex-shrink:0;border-top:1px solid rgba(201,162,39,0.1);
}
.infostrip-label{font-family:'Share Tech Mono',monospace;font-size:7px;
  letter-spacing:2px;color:var(--gold);opacity:.8;margin-bottom:2px;text-transform:uppercase}
.infostrip-title{font-family:'Bebas Neue',sans-serif;font-size:16px;
  letter-spacing:1.5px;color:var(--white);line-height:1}
.infostrip-title .g{color:var(--gold)}
.infostrip-prog{display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:8px}
.prog-track{flex:1;height:2px;background:rgba(255,255,255,0.07);border-radius:1px}
.prog-fill{height:100%;background:linear-gradient(to right,var(--blue),var(--gold));border-radius:1px;transition:width .9s ease}
.prog-pct{font-family:'Share Tech Mono',monospace;font-size:6.5px;color:var(--gray);letter-spacing:1px;white-space:nowrap}

/* ── CTA BAR — same width as phone, set by JS ── */
.cta-bar{
  flex-shrink:0;
  background:#070f1e;
  border:1px solid rgba(201,162,39,0.25);
  border-radius:0 0 10px 10px;
  padding:8px 10px;
  display:flex;align-items:center;gap:8px;
}
.btn-cta{
  flex:1;padding:11px 10px;background:var(--gold);color:var(--navy);
  font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;
  clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%);transition:background .25s;
  animation:ctaPulse 1.8s ease-in-out infinite;
}
.btn-cta:hover{background:var(--gold-light);animation:none;}
@keyframes ctaPulse{
  0%,100%{background:var(--gold);box-shadow:0 0 0 0 rgba(201,162,39,0.7);}
  50%{background:var(--gold-light);box-shadow:0 0 18px 6px rgba(232,195,71,0.45);}
}
.btn-back{
  padding:10px 12px;background:transparent;color:var(--gray);
  font-family:'Be Vietnam Pro',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  border:1px solid rgba(255,255,255,0.1);
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);transition:all .25s;
  white-space:nowrap;flex-shrink:0;
}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
.dot-row{display:flex;gap:5px;align-items:center;flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.1);cursor:pointer;transition:all .25s}
.dot.active{background:var(--gold);width:14px;border-radius:2px}
.dot.done{background:rgba(0,200,150,0.45)}
</style>
</head>
<body>

<!-- 1. STEP NAV -->
<nav class="step-nav" id="stepNav">
  <button class="step-btn active" onclick="goStep(0)"><span class="snum">01</span>Capture</button>
  <button class="step-btn"        onclick="goStep(1)"><span class="snum">02</span>AI Scan</button>
  <button class="step-btn"        onclick="goStep(2)"><span class="snum">03</span>Defects</button>
  <button class="step-btn"        onclick="goStep(3)"><span class="snum">04</span>Fix</button>
  <button class="step-btn"        onclick="goStep(4)"><span class="snum">05</span>Verify</button>
  <button class="step-btn"        onclick="goStep(5)"><span class="snum">06</span>Report</button>
</nav>

<!-- 2. PHONE MOCKUP (standalone, full border-radius) -->
<div class="phone" id="phone">
  <div class="phone-notch"></div>
  <div class="phone-topbar">
    <div class="phone-appname">SONIC <span>AI-PUNCH™</span></div>
    <div class="phone-stepbadge" id="stepBadge">STEP 1 / 6</div>
  </div>
  <div class="phone-progbars">
    <div class="pbar active" id="pb1"></div>
    <div class="pbar" id="pb2"></div>
    <div class="pbar" id="pb3"></div>
    <div class="pbar" id="pb4"></div>
    <div class="pbar" id="pb5"></div>
    <div class="pbar" id="pb6"></div>
  </div>
  <div class="s6-tabs" id="s6tabs" style="display:none">

  <div class="phone-screen">
    <img class="screen-img visible" id="img1"  src="assets/images/ai-demo/1.jpg"  alt="">
    <img class="screen-img"         id="img2"  src="assets/images/ai-demo/2.jpg"  alt="">

    <img class="screen-img"         id="img4"  src="assets/images/ai-demo/4.jpg"  alt="">
    <img class="screen-img"         id="img5"  src="assets/images/ai-demo/5.jpg"  alt="">
    <img class="screen-img"         id="img6"  src="assets/images/ai-demo/6.jpg"  alt="">
    <img class="screen-img"         id="img7"  src="assets/images/ai-demo/7.jpg"  alt="">
    <img class="screen-img"         id="img8"  src="assets/images/ai-demo/8.jpg"  alt="">
    <img class="screen-img"         id="img9"  src="assets/images/ai-demo/9.jpg"  alt="">
    <img class="screen-img"         id="img10" src="assets/images/ai-demo/10.jpg" alt="">
    <img class="screen-img"         id="img11" src="assets/images/ai-demo/11.jpg" alt="">
    <img class="screen-img"         id="img12" src="assets/images/ai-demo/12.jpg" alt="">
    <img class="screen-img"         id="img13" src="assets/images/ai-demo/13.jpg" alt="">
    <img class="screen-img"         id="img14" src="assets/images/ai-demo/14.jpg" alt="">
    <img class="screen-img"         id="img15" src="assets/images/ai-demo/15.jpg" alt="">
    <img class="screen-img"         id="img16" src="assets/images/ai-demo/16.jpg" alt="">
    <div class="scan-line" id="scanLine"></div>
  </div>
  <div class="phone-tags" id="phoneTags" style="display:none"></div>
  <div class="phone-infostrip">
    <div class="infostrip-label" id="iLabel">STEP 01 / 06</div>
    <div class="infostrip-title" id="iTitle">TAKE PHOTO <span class="g">OR UPLOAD</span></div>
    <div class="infostrip-prog">
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-pct" id="progPct">Ready to capture</div>
    </div>
  </div>
  <div class="phone-home"></div>
</div>

<!-- 3. CTA BAR -->
<div class="cta-bar" id="ctaBar">
  <div class="dot-row" id="dotRow"></div>
  <button class="btn-back" id="btnBack" onclick="goStep(window._cur-1)" style="display:none">← Back</button>
  <button class="btn-cta"  id="btnCta"  onclick="ctaClick()">Start AI Scan →</button>
</div>

<script>
// ── Bilingual step data ──────────────────────────────────────────────────────
const STEPS_DATA = {
  en: [
    { label:'STEP 01 / 06', badge:'STEP 1 / 6',
      title:'TAKE PHOTO <span class="g">OR UPLOAD</span>', tags:[],
      prog:{label:'Ready to capture', val:16}, images:['img1'], scan:false,
      ctaLabel:'Start AI Scan →', ctaNext:true },
    { label:'STEP 02 / 06', badge:'STEP 2 / 6',
      title:'AI VISION <span class="g">SCANNING</span>', tags:[],
      prog:{label:'Analysing image…', val:50}, images:['img2','img3'], scan:true,
      ctaLabel:'View Results →', ctaNext:true },
    { label:'STEP 03 / 06', badge:'STEP 3 / 6',
      title:'DEFECTS <span class="g">DETECTED</span>',
      tags:[{text:'CABLE_ROUTING — B Major',cls:'major'},{text:'CABLE_TIE — B Major',cls:'major'},{text:'MARKING_MISSING — B Major',cls:'major'}],
      prog:{label:'Defects confirmed', val:68}, images:['img4','img5','img6'], scan:false,
      ctaLabel:'Mark as Fixed →', ctaNext:true },
    { label:'STEP 04 / 06', badge:'STEP 4 / 6',
      title:'CONFIRM <span class="g">FIX</span>', tags:[],
      prog:{label:'Fix in progress', val:80}, images:['img7'], scan:false,
      ctaLabel:'Confirm Fixed →', ctaNext:true },
    { label:'STEP 05 / 06', badge:'STEP 5 / 6',
      title:'FIXED & <span class="g">VERIFIED</span>',
      tags:[{text:'FIXED ✓',cls:'fixed'},{text:'Report Sent',cls:'pass'}],
      prog:{label:'Defect closed', val:92}, images:['img8','img9'], scan:false,
      ctaLabel:'View Dashboard →', ctaNext:true },
    { label:'STEP 06 / 06', badge:'STEP 6 / 6',
      title:'DASHBOARD <span class="g">& REPORT</span>',
      tags:[{text:'143 Scans',cls:'fixed'},{text:'31% Pass/Fixed',cls:'pass'},{text:'PDF + Excel',cls:'fixed'}],
      prog:{label:'Monthly report ready', val:100},
      images:['img10','img11'], images2:['img12','img13','img14','img15','img16'], scan:false,
      ctaLabel:'Get AI-Punch™', ctaNext:false, hasTabs:true }
  ],
  vi: [
    { label:'BƯỚC 01 / 06', badge:'BƯỚC 1 / 6',
      title:'CHỤP ẢNH <span class="g">HOẶC TẢI LÊN</span>', tags:[],
      prog:{label:'Sẵn sàng chụp', val:16}, images:['img1'], scan:false,
      ctaLabel:'Bắt Đầu Quét AI →', ctaNext:true },
    { label:'BƯỚC 02 / 06', badge:'BƯỚC 2 / 6',
      title:'AI VISION <span class="g">ĐANG QUÉT</span>', tags:[],
      prog:{label:'Đang phân tích ảnh…', val:50}, images:['img2','img3'], scan:true,
      ctaLabel:'Xem Kết Quả →', ctaNext:true },
    { label:'BƯỚC 03 / 06', badge:'BƯỚC 3 / 6',
      title:'LỖI <span class="g">ĐÃ PHÁT HIỆN</span>',
      tags:[{text:'CABLE_ROUTING — B Major',cls:'major'},{text:'CABLE_TIE — B Major',cls:'major'},{text:'MARKING_MISSING — B Major',cls:'major'}],
      prog:{label:'Lỗi đã xác nhận', val:68}, images:['img4','img5','img6'], scan:false,
      ctaLabel:'Đánh Dấu Đã Sửa →', ctaNext:true },
    { label:'BƯỚC 04 / 06', badge:'BƯỚC 4 / 6',
      title:'XÁC NHẬN <span class="g">ĐÃ SỬA</span>', tags:[],
      prog:{label:'Đang sửa chữa', val:80}, images:['img7'], scan:false,
      ctaLabel:'Xác Nhận Đã Sửa →', ctaNext:true },
    { label:'BƯỚC 05 / 06', badge:'BƯỚC 5 / 6',
      title:'ĐÃ SỬA & <span class="g">XÁC NHẬN</span>',
      tags:[{text:'ĐÃ SỬA ✓',cls:'fixed'},{text:'Đã Gửi Báo Cáo',cls:'pass'}],
      prog:{label:'Lỗi đã đóng', val:92}, images:['img8','img9'], scan:false,
      ctaLabel:'Xem Dashboard →', ctaNext:true },
    { label:'BƯỚC 06 / 06', badge:'BƯỚC 6 / 6',
      title:'DASHBOARD <span class="g">& BÁO CÁO</span>',
      tags:[{text:'143 Lượt Quét',cls:'fixed'},{text:'31% Pass/Đã Sửa',cls:'pass'},{text:'PDF + Excel',cls:'fixed'}],
      prog:{label:'Báo cáo tháng sẵn sàng', val:100},
      images:['img10','img11'], images2:['img12','img13','img14','img15','img16'], scan:false,
      ctaLabel:'Dùng AI-Punch™', ctaNext:false, hasTabs:true }
  ]
};

// Nav button labels per lang
const NAV_LABELS = {
  en: ['Capture','AI Scan','Defects','Fix','Verify','Report'],
  vi: ['Chụp Ảnh','Quét AI','Lỗi','Sửa','Xác Nhận','Báo Cáo']
};
// Tab labels per lang
const TAB_LABELS = {
  en: {dashboard:'📊 Dashboard', report:'📄 Report', back:'← Back'},
  vi: {dashboard:'📊 Dashboard', report:'📄 Báo Cáo', back:'← Quay Lại'}
};

let _lang = (function(){
  try{ return (window.parent !== window && localStorage) ? localStorage.getItem('lang') : null; }catch(e){ return null; }
})() || 'en';

function STEPS(){ return STEPS_DATA[_lang] || STEPS_DATA.en; }

window._cur = 0;
let cycleTimer=null,cycleIdx=0,s6tab='dashboard';

// Fit phone height to available space, width from aspect ratio, sync nav+cta
function syncSize() {
  const navH = document.getElementById('stepNav').offsetHeight;
  const ctaH = document.getElementById('ctaBar').offsetHeight;
  const gap   = 16; // 8px margin top + bottom on phone
  const phoneH = window.innerHeight - navH - ctaH - gap;
  const phoneW = Math.floor(phoneH * (9 / 19.5));

  const phone  = document.getElementById('phone');
  const nav    = document.getElementById('stepNav');
  const cta    = document.getElementById('ctaBar');

  phone.style.height = phoneH + 'px';
  phone.style.width  = phoneW + 'px';
  nav.style.width    = phoneW + 'px';
  cta.style.width    = phoneW + 'px';
}
requestAnimationFrame(function(){ syncSize(); });
window.addEventListener('resize', syncSize);

function updateNavLabels() {
  const labels = NAV_LABELS[_lang] || NAV_LABELS.en;
  document.querySelectorAll('.step-btn').forEach((b, i) => {
    const snum = b.querySelector('.snum');
    b.textContent = '';
    b.appendChild(snum);
    b.appendChild(document.createTextNode(labels[i] || ''));
  });
  const tl = TAB_LABELS[_lang] || TAB_LABELS.en;
  const tabs = document.querySelectorAll('.s6-tab');
  if (tabs[0]) tabs[0].textContent = tl.dashboard;
  if (tabs[1]) tabs[1].textContent = tl.report;
}

function goStep(n) {
  const steps = STEPS();
  if (n < 0 || n >= steps.length) return;
  window._cur = n;
  const s = steps[n];
  if (n !== 5) s6tab = 'dashboard';

  document.querySelectorAll('.step-btn').forEach((b,i) => {
    b.classList.toggle('active', i===n);
    b.classList.toggle('done', i<n);
  });
  for (let i=1;i<=6;i++){
    const pb = document.getElementById('pb'+i);
    pb.className = 'pbar'+(i-1<n?' done':i-1===n?' active':'');
  }
  document.getElementById('stepBadge').textContent = s.badge;
  const s6 = document.getElementById('s6tabs');
  s6.style.display = s.hasTabs ? 'flex' : 'none';
  if (s.hasTabs) document.querySelectorAll('.s6-tab').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase().includes(s6tab)));

  document.getElementById('iLabel').textContent = s.label;
  document.getElementById('iTitle').innerHTML = s.title;
  document.getElementById('progPct').textContent = s.prog.label;
  setTimeout(()=>{ const pf=document.getElementById('progFill'); if(pf) pf.style.width=s.prog.val+'%'; },60);

  const tagsEl = document.getElementById('phoneTags');
  tagsEl.innerHTML = s.tags.map(t=>`<div class="dtag ${t.cls}">${t.text}</div>`).join('');
  tagsEl.style.display = s.tags.length ? 'flex' : 'none';

  document.getElementById('btnCta').textContent = s.ctaLabel;
  const backBtn = document.getElementById('btnBack');
  backBtn.style.display = n > 0 ? 'block' : 'none';
  backBtn.textContent = (TAB_LABELS[_lang]||TAB_LABELS.en).back;
  document.getElementById('dotRow').innerHTML = steps.map((_,i) =>
    `<div class="dot${i===n?' active':i<n?' done':''}" onclick="goStep(${i})"></div>`).join('');

  showImages(s.images, s.scan);
}

function ctaClick() {
  const s = STEPS()[window._cur];
  if (s.ctaNext) goStep(window._cur+1);
  else {
    try {
      const top = window.top || window.parent;
      top.location.hash = '#get-access';
      top.document.getElementById('get-access').scrollIntoView({behavior:'smooth'});
    } catch(e) {
      window.open('https://sonicei.com/ai-punch#get-access', '_blank');
    }
  }
}
function switchS6Tab(tab) {
  s6tab = tab;
  const steps = STEPS();
  showImages(tab==='dashboard' ? steps[5].images : steps[5].images2, false);
  document.querySelectorAll('.s6-tab').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase().includes(tab)));
}
function showImages(images, scan) {
  document.querySelectorAll('.screen-img').forEach(el => el.classList.remove('visible'));
  document.getElementById('scanLine').classList.toggle('active', scan);
  if (cycleTimer) { clearInterval(cycleTimer); cycleTimer=null; }
  if (images.length===1) {
    const el = document.getElementById(images[0]); if(el) el.classList.add('visible');
  } else {
    cycleIdx=0;
    const tick=()=>{
      document.querySelectorAll('.screen-img').forEach(el=>el.classList.remove('visible'));
      const el=document.getElementById(images[cycleIdx%images.length]); if(el) el.classList.add('visible');
      cycleIdx++;
    };
    tick(); cycleTimer=setInterval(tick,1800);
  }
}
// ── postMessage listener: parent page sends {type:"setLang", lang:"vi"|"en"} ──
window.addEventListener("message", function(e) {
  if (!e.data || e.data.type !== "setLang") return;
  var lang = e.data.lang;
  if (!STEPS_DATA[lang]) return;
  _lang = lang;
  updateNavLabels();
  goStep(window._cur);
});

updateNavLabels();
goStep(0);
</script>
