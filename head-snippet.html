<!-- ═══════════════════════════════════════════════════════
     SONIC E&I — OPTIMIZED <head> SNIPPET
     Thay thế phần <head> hiện tại trong index.html
     Các thay đổi: font tối ưu, defer analytics, lazy EmailJS
     ═══════════════════════════════════════════════════════ -->

<!-- CHARSET + VIEWPORT — giữ nguyên -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FAVICON -->
<link rel="icon" type="image/png" href="SONICEI_LOGO.png">
<link rel="apple-touch-icon" href="SONICEI_LOGO.png">

<!-- SEO + OG + Twitter — giữ nguyên, không thay đổi -->
<!-- ... (giữ toàn bộ meta tags hiện tại) ... -->

<!-- ═══ FIX 1: PRECONNECT — chỉ giữ critical origins ═══ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- BỎ: cdn.jsdelivr.net (EmailJS sẽ lazy-load) -->
<!-- BỎ: googletagmanager + connect.facebook.net (delay analytics) -->

<!-- ═══ FIX 2: HERO IMAGE PRELOAD — thêm fetchpriority trên IMG tag ═══ -->
<!-- Giữ nguyên preload links hiện tại: -->
<link rel="preload" as="image" href="assets/images/img_33_mobile.webp"
      fetchpriority="high" media="(max-width: 768px)">
<link rel="preload" as="image" href="assets/images/img_33.webp"
      fetchpriority="high" media="(min-width: 769px)">
<!-- THÊM: đảm bảo img tag trong HTML cũng có fetchpriority="high" và width/height -->

<!-- ═══ FIX 3: FONTS — giảm từ 5 xuống 3 family, bỏ Roboto Condensed ═══ -->
<!-- THAY THẾ link fonts hiện tại bằng link này: -->
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap">
</noscript>
<!-- ĐÃ BỎ: Roboto Condensed (chỉ dùng 1 lần trong toàn bộ CSS) -->
<!-- ĐÃ BỎ: Rajdhani wght@300;500 (không dùng trong main.css) -->

<!-- ═══ FIX 4: CSS — shared + main với preload pattern ═══ -->
<link rel="preload" href="shared.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<link rel="preload" href="main.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="main.css">
</noscript>

<!-- ═══ FIX 5: CRITICAL CSS INLINE (above-the-fold) ═══ -->
<!-- Paste nội dung critical-css.css (file riêng bên dưới) vào đây -->
<style>
/* === CRITICAL CSS — nav + hero + pain bar + ticker === */
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;max-width:100%}
html{scroll-behavior:smooth}
body{background:#0a1628;color:#f0f4ff;font-family:'Rajdhani',sans-serif;font-size:17px;line-height:1.75}
:root{--navy:#0a1628;--navy-mid:#112040;--gold:#c9a227;--gold-light:#e8c347;--white:#f0f4ff;--gray:#8899bb;--accent:#1a4a8a}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 16px;height:46px;display:flex;align-items:center;background:rgba(10,22,40,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,162,39,0.2)}
.logo-wrap{display:flex;flex-direction:row;align-items:center;gap:10px;flex-shrink:0}
.logo-line{white-space:nowrap;color:#c9a227;font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:18px;letter-spacing:2px}
.logo-line-ei{color:#f0f4ff}
.nav-links{display:flex;align-items:center;gap:0;flex:1;justify-content:center}
.nav-links a{text-decoration:none;color:#8899bb;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.3s;white-space:nowrap;padding:0 10px}
.nav-links a:hover{color:#c9a227}
.nav-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.btn-gold{display:inline-block;padding:8px 18px;background:#c9a227;color:#0a1628;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:background 0.2s;white-space:nowrap}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;position:relative;overflow:hidden;padding:90px 60px 80px}
.hero-bg{position:absolute;inset:0;background:linear-gradient(100deg,rgba(10,22,40,0.92) 0%,rgba(10,22,40,0.75) 55%,rgba(10,22,40,0.65) 100%),url('assets/images/img_33.webp') center center/cover no-repeat}
.hero-content{position:relative;z-index:2;max-width:780px;width:100%;text-align:center;align-items:center}
.sub-nav-wrap{position:fixed;top:0;left:0;right:0;z-index:99;transform:translateY(46px);width:100%}
.hero-pain-bar{position:relative;z-index:1;height:40px;background:rgba(8,18,34,0.98);border-top:1px solid rgba(201,162,39,0.5);border-bottom:1px solid rgba(201,162,39,0.5);padding:0 80px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:0.3px;color:#ffe066;text-transform:uppercase;white-space:nowrap;overflow:hidden}
.ticker-bar{background:rgba(201,162,39,0.08);border-bottom:1px solid rgba(201,162,39,0.2);overflow:hidden;height:26px}
.ticker-track{display:flex;width:max-content;white-space:nowrap;height:100%;align-items:center}
@media(max-width:900px){.hamburger{display:flex}.nav-links{display:none}.nav-right{display:none}}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;margin-left:auto;z-index:110}
.hamburger span{display:block;width:22px;height:2px;background:#c9a227;transition:all 0.3s}
</style>
